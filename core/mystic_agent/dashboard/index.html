<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MysticAgent — panel</title>
    <style>
      :root {
        --bg: #04060a;
        --panel: #0b111b;
        --panel-2: #0f1723;
        --line: #1a2330;
        --ink: #e7edf5;
        --dim: #8595a8;
        --cyan: #22d3ee;
        --violet: #a78bfa;
        --ok: #4ade80;
        --amber: #f5a623;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--cyan); text-decoration: none; }
      .mono { font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, monospace; }
      header {
        position: sticky; top: 0; z-index: 10;
        display: flex; align-items: center; gap: 12px;
        padding: 16px 22px;
        background: rgba(4, 6, 10, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }
      header .brand { font-weight: 600; letter-spacing: -0.01em; }
      header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
        box-shadow: 0 0 10px var(--ok); }
      header .ver { color: var(--dim); font-size: 12px; }
      main { max-width: 940px; margin: 0 auto; padding: 26px 22px 80px; }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--dim); font-weight: 600; margin: 34px 0 14px; }
      .card { background: var(--panel); border: 1px solid var(--line);
        border-radius: 16px; padding: 18px; }
      .row { display: flex; align-items: center; gap: 12px; }
      .grid { display: grid; gap: 12px; }
      @media (min-width: 720px) { .grid.two { grid-template-columns: 1fr 1fr; } }

      /* decision inbox */
      .decision { border-left: 2px solid var(--amber); }
      .decision .meta { color: var(--dim); font-size: 13px; margin-top: 4px; }
      .btns { display: flex; gap: 8px; margin-top: 12px; }
      button { font: inherit; cursor: pointer; border: 0; border-radius: 999px;
        padding: 8px 16px; font-size: 13px; font-weight: 500; }
      .yes { background: var(--cyan); color: #06222a; }
      .no { background: #1b2330; color: var(--ink); }
      .yes:hover { filter: brightness(1.08); }
      .no:hover { background: #232d3d; }

      /* permission segmented control */
      .cap { padding: 14px 16px; }
      .cap .name { font-weight: 500; }
      .cap .tools { color: var(--dim); font-size: 12px; margin-top: 2px; }
      .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line);
        border-radius: 999px; padding: 3px; margin-top: 10px; flex-wrap: wrap; }
      .seg button { border-radius: 999px; padding: 6px 12px; font-size: 12px;
        background: transparent; color: var(--dim); }
      .seg button.on { background: var(--cyan); color: #06222a; }
      .seg button.on.silent { background: var(--violet); color: #180a2e; }
      .seg button.on.off { background: #2a3444; color: var(--ink); }

      /* activity feed */
      .feed { max-height: 340px; overflow-y: auto; }
      .ev { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line);
        font-size: 13px; }
      .ev:last-child { border-bottom: 0; }
      .ev .t { color: var(--dim); font-size: 12px; white-space: nowrap; }
      .ev .a { color: var(--cyan); white-space: nowrap; }
      .empty { color: var(--dim); font-size: 14px; }

      input { font: inherit; width: 100%; background: var(--panel-2); color: var(--ink);
        border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-top: 8px; }
      .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
        color: var(--dim); }
      .pill .d { width: 7px; height: 7px; border-radius: 50%; }
      .save { background: var(--cyan); color: #06222a; margin-top: 12px; }
      .hint { color: var(--dim); font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <header>
      <span class="dot" id="statusDot"></span>
      <span class="brand">MysticAgent</span>
      <span class="ver mono" id="ver"></span>
      <span style="margin-left:auto" class="pill">
        <span class="d" style="background:var(--cyan)"></span>
        <span id="chan">—</span>
      </span>
    </header>
    <main>
      <section id="inboxWrap" style="display:none">
        <h2>Skrzynka decyzji</h2>
        <div class="grid" id="inbox"></div>
      </section>

      <h2>Umiejętności i uprawnienia</h2>
      <div class="grid" id="caps"></div>

      <h2>Automatyzacje</h2>
      <div class="card" id="autos"><span class="empty">brak aktywnych automatyzacji</span></div>

      <h2>Aktywność</h2>
      <div class="card feed" id="feed"></div>

      <h2>Połączenia</h2>
      <div class="card grid two">
        <div>
          <div class="row" style="justify-content:space-between">
            <span>Klucz LLM</span><span class="pill" id="llmPill"></span>
          </div>
          <input id="llmKey" type="password" placeholder="sk-ant-… lub sk-…" />
        </div>
        <div>
          <div class="row" style="justify-content:space-between">
            <span>Token Telegram</span><span class="pill" id="tgPill"></span>
          </div>
          <input id="tgToken" type="password" placeholder="123456:ABC…" />
        </div>
        <div>
          <div class="row" style="justify-content:space-between">
            <span>E-mail</span><span class="pill" id="mailPill"></span>
          </div>
          <input id="mailAddr" type="text" placeholder="ty@gmail.com" />
          <input id="mailPass" type="password" placeholder="hasło aplikacji" />
        </div>
        <div style="align-self:end">
          <button class="save" onclick="saveConn()">Zapisz do sejfu</button>
          <p class="hint">Zapisywane w szyfrowanym sejfie na tej maszynie.
            Po zmianie zrestartuj agenta.</p>
        </div>
      </div>
    </main>

    <script>
      const LEVELS = [
        ["off", "Wyłączone", "off"],
        ["propose", "Proponuje", ""],
        ["act_report", "Robi + raport", ""],
        ["act_silent", "Robi cicho", "silent"],
      ];
      const CAP_LABEL = {
        system: "System", notes: "Notatki", memory: "Pamięć", reminders: "Przypomnienia",
        web: "Internet", calendar: "Kalendarz", files: "Pliki (odczyt)",
        files_write: "Pliki (zapis)", contacts: "Kontakty", tasks: "Zadania",
        shell: "Terminal", email_read: "Poczta (czyta)", email_send: "Poczta (wysyła)",
        automations: "Automatyzacje", payment: "Płatności", browser: "Przeglądarka",
        skills: "Wyuczone skille", forge: "Kuźnia narzędzi",
      };

      async function j(url, opts) {
        const r = await fetch(url, opts);
        return r.ok ? r.json() : null;
      }

      async function setLevel(cap, level) {
        await fetch(`/permissions/${cap}/${level}`, { method: "POST" });
        refresh();
      }
      async function decide(id, verdict) {
        await fetch(`/inbox/${id}/${verdict}`, { method: "POST" });
        refresh();
      }
      async function saveConn() {
        const body = {
          llm_key: llmKey.value.trim(),
          telegram_token: tgToken.value.trim(),
          email_address: mailAddr.value.trim(),
          email_password: mailPass.value.trim(),
        };
        await fetch("/connections", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        llmKey.value = tgToken.value = mailAddr.value = mailPass.value = "";
        refresh();
      }

      function pill(el, ok) {
        el.innerHTML = `<span class="d" style="background:${ok ? "var(--ok)" : "var(--dim)"}"></span>${ok ? "podłączone" : "brak"}`;
      }

      async function refresh() {
        const health = await j("/health");
        if (health) {
          ver.textContent = health.version;
          chan.textContent = health.telegram ? "telegram · online" : "tylko lokalnie";
        }

        // decision inbox
        const inbox = (await j("/inbox")) || [];
        inboxWrap.style.display = inbox.length ? "block" : "none";
        document.getElementById("inbox").innerHTML = inbox.map((d) => `
          <div class="card decision">
            <div><b>${d.tool}</b> <span class="mono" style="color:var(--dim)">${JSON.stringify(d.args)}</span></div>
            <div class="meta">${d.reason || ""}</div>
            <div class="btns">
              <button class="yes" onclick="decide('${d.id}','approve')">✓ Zatwierdź</button>
              <button class="no" onclick="decide('${d.id}','reject')">✕ Odrzuć</button>
            </div>
          </div>`).join("");

        // skills grouped by capability + permission sliders
        const [skills, perms] = await Promise.all([j("/skills"), j("/permissions")]);
        const byCap = {};
        (skills || []).forEach((t) => {
          (byCap[t.capability] = byCap[t.capability] || []).push(t.name);
        });
        document.getElementById("caps").innerHTML = Object.keys(byCap).sort().map((cap) => {
          const level = (perms || {})[cap] || "propose";
          const seg = LEVELS.map(([val, lbl, cls]) =>
            `<button class="${level === val ? "on " + cls : ""}" onclick="setLevel('${cap}','${val}')">${lbl}</button>`
          ).join("");
          return `<div class="card cap">
            <div class="name">${CAP_LABEL[cap] || cap}</div>
            <div class="tools mono">${byCap[cap].join(" · ")}</div>
            <div class="seg">${seg}</div>
          </div>`;
        }).join("");

        // automations
        const autos = (await j("/automations")) || [];
        document.getElementById("autos").innerHTML = autos.length
          ? autos.map((a) => `<div class="ev"><span class="a">${a.kind}</span><span>${a.instruction}</span></div>`).join("")
          : `<span class="empty">brak aktywnych automatyzacji</span>`;

        // activity
        const audit = (await j("/audit?limit=40")) || [];
        document.getElementById("feed").innerHTML = audit.length
          ? audit.map((e) => {
              const t = new Date(e.ts).toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
              return `<div class="ev"><span class="t mono">${t}</span><span class="a mono">${e.action}</span><span>${(e.reason || "").slice(0, 80)}</span></div>`;
            }).join("")
          : `<span class="empty">jeszcze nic się nie działo</span>`;

        // connections status
        const conn = await j("/connections");
        if (conn) { pill(llmPill, conn.llm); pill(tgPill, conn.telegram); pill(mailPill, conn.email); }
      }

      refresh();
      setInterval(refresh, 4000);
    </script>
  </body>
</html>
